name: The AEO Loop LinkedIn scheduler

# Posts the due LinkedIn Company Page update on Mon/Wed/Fri (per linkedin-manifest.json,
# 09:00 ET). Runs at 13:xx and 14:xx UTC to cover 9am ET in both EDT and EST; the
# publisher only posts what's due and not already in linkedin-posted.json, so the extra
# checks can't double-post.
on:
  schedule:
    - cron: "3,33 13,14 * * 1,3,5"
  workflow_dispatch:
    inputs:
      mode:
        description: "due (default) | check | <slug to post now>"
        required: false
        default: "due"

permissions:
  contents: write

concurrency:
  group: aeo-linkedin-publish
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Re-read the posted log at the last moment
        run: |
          git fetch origin ${{ github.event.repository.default_branch }} --quiet
          git checkout FETCH_HEAD -- content/linkedin-posted.json 2>/dev/null || true
      - name: Publish due / run mode
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_VERSION: ${{ vars.LINKEDIN_VERSION }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ] || [ "$MODE" = "due" ]; then
            python automation/linkedin_publisher.py --due
          elif [ "$MODE" = "check" ]; then
            python automation/linkedin_publisher.py --check
          else
            python automation/linkedin_publisher.py --slug "$MODE"
          fi
      - name: Commit the posted log
        run: |
          git config user.name "aeo-bot"
          git config user.email "aeo-bot@users.noreply.github.com"
          git add content/linkedin-posted.json
          if git diff --cached --quiet; then echo "nothing to record"; exit 0; fi
          git commit -m "chore: record LinkedIn post"
          git push || (git pull --rebase --autostash && git push)
